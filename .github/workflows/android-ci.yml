name: Android CI

# Android-only for now (no Mac — PLAN.md §12). iOS jobs get added at iOS bring-up.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared logic tests (commonTest)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble Android debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace
